<div *ngIf="product">
    <h3>{{product.name}}</h3>
    <img [src]="product.image" width="200" alt="product image">
    <p>Price: Rs.{{product.price}}</p>

<button><a [routerLink]="['reviews']" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Reviews</a></button>    
  </div>
  <router-outlet></router-outlet>

<div *ngIf="product">
    <h3>{{product.name}}</h3>
    <img [src]="product.image" width="200" alt="product image">
    <p>Price: Rs.{{product.price}}</p>
    <button (click)="addCart()">Add to Cart</button>
    <button (click)="addList()">Add to WishList</button>
    <div>
        <button (click)="goToReviews()">Reviews</button>
    </div>
  </div>
  <router-outlet></router-outlet>
